version: '3.8'

services:
  # Service 1: Aplikasi Laravel
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  # Service 2: Database
  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bengkel_db
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    volumes:
      - db_data:/var/lib/mysql

  # Service 3: phpMyAdmin (BARU DITAMBAHKAN)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      # Kita pakai port 8082 biar BEDA dengan Sarpras (yang pakai 8081)
      # Jadi kamu bisa jalanin dua-duanya sekaligus tanpa bentrok!
      - "8082:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db

volumes:
  db_data: